<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Watch Wizard</title>
<meta name="theme-color" content="#faf6ef">
<meta name="description" content="Your cosy little wizard for finding where UK films & TV shows are streaming, tracking your subscriptions, and logging what you watch.">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Watch Wizard">
<style>
:root {
  --bg: #faf6ef;
  --bg-elev: #fffdf8;
  --bg-elev-2: #f2ebde;
  --text: #3a2f28;
  --text-dim: #857567;
  --text-faint: #a99a8b;
  --border: #ece2d2;
  --accent: #c8683f;
  --accent-2: #e08a5c;
  --accent-dim: rgba(200,104,63,0.12);
  --green: #5a8f5a;
  --green-dim: rgba(90,143,90,0.14);
  --amber: #b3822c;
  --amber-bg: rgba(214,158,64,0.14);
  --amber-border: rgba(214,158,64,0.4);
  --red: #c0573f;
  --shadow: 0 2px 6px rgba(90,60,40,0.06), 0 10px 30px rgba(90,60,40,0.07);
  --radius: 20px;
  --radius-sm: 14px;
}
html[data-theme="dark"] {
  --bg: #211a15;
  --bg-elev: #2c231d;
  --bg-elev-2: #392e26;
  --text: #f3e9dd;
  --text-dim: #bcaa99;
  --text-faint: #8a7a6b;
  --border: #453930;
  --accent: #e59062;
  --accent-2: #f0a878;
  --accent-dim: rgba(229,144,98,0.18);
  --green: #7bb37b;
  --green-dim: rgba(123,179,123,0.16);
  --amber: #e0b25e;
  --amber-bg: rgba(224,178,94,0.12);
  --amber-border: rgba(224,178,94,0.35);
  --red: #e58267;
  --shadow: 0 2px 6px rgba(0,0,0,0.35), 0 12px 32px rgba(0,0,0,0.4);
  --radius: 20px;
  --radius-sm: 14px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16.5px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background .2s, color .2s;
}
#app { max-width: 880px; margin: 0 auto; padding: 0 16px 72px; }
a { color: var(--accent); }

/* Header */
.topbar {
  position: sticky; top: 0; z-index: 20;
  background: color-mix(in srgb, var(--bg) 90%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  margin: 0 -16px 24px; padding: 16px;
}
.topbar-inner { max-width: 880px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
.brand { font-size: 21px; font-weight: 800; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
.brand .logo { font-size: 24px; }
.brand .accent { color: var(--accent); }
.topbar-spacer { flex: 1; }
.icon-btn {
  background: var(--bg-elev); border: 1px solid var(--border); color: var(--text);
  width: 44px; height: 44px; border-radius: 999px; cursor: pointer; font-size: 19px;
  display: inline-flex; align-items: center; justify-content: center; transition: .15s;
  box-shadow: var(--shadow);
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
/* Sync status pill */
.sync-pill {
  display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600;
  padding: 6px 10px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--bg-elev); color: var(--text-dim); cursor: pointer; transition: .15s; white-space: nowrap;
}
.sync-pill:hover { border-color: var(--accent); }
.sync-pill.synced { color: var(--green); border-color: var(--green); }
.sync-pill.offline { color: var(--amber); border-color: var(--amber-border); }
.sync-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
@media (max-width: 480px) { .sync-pill .sync-label { display: none; } .sync-pill { padding: 6px 8px; } }

/* Tabs */
.tabs { display: flex; gap: 6px; background: var(--bg-elev-2); padding: 6px; border-radius: 18px; margin-bottom: 28px; }
.tab {
  flex: 1; text-align: center; padding: 12px 8px; border-radius: 14px; cursor: pointer;
  font-weight: 600; font-size: 14.5px; color: var(--text-dim); border: none; background: none; transition: .15s;
}
.tab:hover { color: var(--text); }
.tab.active { background: var(--bg-elev); color: var(--accent); box-shadow: var(--shadow); font-weight: 700; }

/* Inputs */
.input, input[type="text"], input[type="date"], input[type="password"], input[type="email"], input[type="url"] {
  width: 100%; padding: 14px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-elev); color: var(--text);
  font-size: 15.5px; font-family: inherit; outline: none; transition: .15s;
}
.input:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.search-wrap { position: relative; margin-bottom: 20px; }
.search-wrap .clear-x {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  cursor: pointer; color: var(--text-faint); background: none; border: none; font-size: 20px; padding: 4px 8px;
}
.btn {
  display: inline-flex; align-items: center; gap: 8px; justify-content: center;
  padding: 12px 20px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--bg-elev); color: var(--text); font-weight: 600; font-size: 14.5px;
  cursor: pointer; font-family: inherit; transition: .15s; min-height: 44px;
}
.btn:hover { border-color: var(--accent); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 3px 10px var(--accent-dim); }
.btn-primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
.btn-sm { padding: 8px 16px; font-size: 13.5px; min-height: 38px; }
.btn-ghost { background: none; border-color: transparent; }
.btn-danger { color: var(--red); }
.btn-danger:hover { border-color: var(--red); }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* Cards */
.card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }

/* Result list */
.result-list { display: flex; flex-direction: column; gap: 10px; }
.result-item {
  display: flex; gap: 14px; align-items: center; padding: 12px; border-radius: var(--radius-sm);
  cursor: pointer; border: 1px solid transparent; transition: .12s; text-align: left; background: var(--bg-elev);
  border-color: var(--border); box-shadow: var(--shadow);
}
.result-item:hover { border-color: var(--accent); transform: translateY(-2px); }
.poster-thumb { width: 48px; height: 72px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--bg-elev-2); }
.poster-thumb.placeholder { display: flex; align-items: center; justify-content: center; font-size: 22px; }
.result-meta { flex: 1; min-width: 0; }
.result-title { font-weight: 700; font-size: 15px; }
.result-sub { color: var(--text-dim); font-size: 13px; display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: var(--bg-elev-2); color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; }
.badge.tv { background: rgba(90,120,255,.16); color: #6f8dff; }
.badge.movie { background: rgba(255,150,60,.16); color: #ff9a3c; }

/* Detail */
.detail-hero { display: flex; gap: 18px; margin-bottom: 20px; }
.detail-poster { width: 120px; border-radius: 16px; flex-shrink: 0; box-shadow: var(--shadow); object-fit: cover; background: var(--bg-elev-2); }
.detail-poster.placeholder { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
.detail-title { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 4px; }
/* Title links to TMDB but keeps the heading look — inherits colour, subtle ↗ + hover underline. */
.title-link { color: inherit; text-decoration: none; }
.title-link:hover { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--accent); }
.title-link .ext { font-size: 0.6em; color: var(--text-faint); margin-left: 5px; vertical-align: middle; font-weight: 600; }
.title-link:hover .ext { color: var(--accent); }
.detail-overview { color: var(--text-dim); font-size: 14px; margin-top: 10px; }
.summary-line {
  padding: 16px 18px; border-radius: var(--radius); margin-bottom: 22px; font-weight: 600; font-size: 15.5px;
  background: var(--green-dim); border: 1px solid transparent; display: flex; align-items: center; gap: 10px;
}
.summary-line.have { border-color: var(--green); color: var(--green); }
.summary-line.nohave { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber); }
.summary-line.none { background: var(--bg-elev-2); color: var(--text-dim); }

.prov-group { margin-bottom: 24px; }
.prov-group h4 { font-size: 12.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); margin: 0 0 12px; font-weight: 700; }
.prov-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
/* Provider card: logo | name+labels(+owned chip) | watch button, laid out with flex.
   Everything is in normal flow (no absolute positioning) so nothing overlaps at any width. */
.prov-card {
  display: flex; flex-wrap: wrap; align-items: center; gap: 12px; padding: 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-elev); box-shadow: var(--shadow);
}
.prov-card.owned { border-color: var(--green); box-shadow: 0 0 0 2px var(--green-dim); }
.prov-logo { width: 52px; height: 52px; border-radius: 14px; object-fit: cover; flex-shrink: 0; background: var(--bg-elev-2); }
.prov-info { flex: 1 1 auto; min-width: 80px; }   /* grows/shrinks; min-width floor keeps the name column readable so long names wrap at word boundaries. When logo+name+button can't share one line, the card's flex-wrap drops the button to its own line instead of crushing this column to ~0 (which caused per-character wrapping). */
.prov-name { font-weight: 600; font-size: 14.5px; line-height: 1.25; overflow-wrap: anywhere; }
.prov-labels { font-size: 11.5px; color: var(--text-dim); margin-top: 3px; }
.have-chip { display: inline-block; background: var(--green); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin-top: 6px; }
.prov-watch-btn { flex-shrink: 0; white-space: nowrap; padding-left: 14px; padding-right: 14px; }

/* Services */
.svc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
.svc-card {
  display: flex; align-items: center; gap: 14px; padding: 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-elev); transition: .12s; box-shadow: var(--shadow);
}
.svc-card.owned { border-color: var(--green); background: var(--green-dim); }
.svc-card .svc-info { flex: 1; min-width: 0; }
.svc-card .svc-name { font-weight: 600; font-size: 14.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toggle {
  width: 46px; height: 26px; border-radius: 999px; background: var(--bg-elev-2); border: 1px solid var(--border);
  position: relative; cursor: pointer; flex-shrink: 0; transition: .15s; padding: 0;
}
.toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: var(--text-faint); transition: .15s; }
.toggle.on { background: var(--green); border-color: var(--green); }
.toggle.on::after { left: 22px; background: #fff; }
.section-head { display: flex; align-items: center; gap: 10px; margin: 32px 0 14px; }
.section-head h3 { margin: 0; font-size: 17px; letter-spacing: -0.01em; }
.count-pill { background: var(--accent-dim); color: var(--accent); font-weight: 700; font-size: 12px; padding: 3px 11px; border-radius: 999px; }

/* Stats */
.seg { display: inline-flex; background: var(--bg-elev-2); border-radius: 12px; padding: 4px; gap: 2px; margin-bottom: 20px; flex-wrap: wrap; }
.seg button { border: none; background: none; color: var(--text-dim); padding: 7px 14px; border-radius: 9px; cursor: pointer; font-weight: 600; font-size: 13px; font-family: inherit; }
.seg button.active { background: var(--bg-elev); color: var(--accent); box-shadow: var(--shadow); }
.stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
.stat-box { padding: 20px; border-radius: var(--radius); background: var(--bg-elev); border: 1px solid var(--border); box-shadow: var(--shadow); }
.stat-box .big { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }
.stat-box .lbl { color: var(--text-dim); font-size: 13px; margin-top: 2px; }
.bar-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
.bar-head { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.bar-head .cnt { margin-left: auto; font-weight: 700; }
.bar-head .chev { color: var(--text-faint); transition: transform .15s; }
.bar-head.open .chev { transform: rotate(90deg); }
.bar-track { height: 8px; border-radius: 999px; background: var(--bg-elev-2); margin-top: 8px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .4s; }
.bar-detail { margin-top: 10px; padding-left: 34px; display: flex; flex-direction: column; gap: 4px; }
.bar-detail .row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-dim); }
.warn-box { background: var(--amber-bg); border: 1px solid var(--amber-border); border-radius: var(--radius); padding: 20px; margin-bottom: 28px; box-shadow: var(--shadow); }
.warn-box h3 { color: var(--amber); margin: 0 0 6px; font-size: 15.5px; }
.warn-box p { color: var(--text-dim); font-size: 13.5px; margin: 0 0 14px; }
.warn-list { display: flex; flex-wrap: wrap; gap: 8px; }
.warn-list .chip { display: flex; align-items: center; gap: 8px; background: var(--bg-elev); border: 1px solid var(--amber-border); padding: 8px 12px; border-radius: 999px; font-size: 13px; font-weight: 600; }
.hist-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.hist-row .h-title { font-weight: 600; }
.hist-row .h-meta { color: var(--text-dim); font-size: 12px; }
.hist-row .del { margin-left: auto; }

/* Setup / settings */
.setup-wrap { max-width: 520px; margin: 44px auto; }
.setup-card { padding: 32px; }
.setup-card h2 { margin-top: 0; }
.field-label { font-weight: 600; font-size: 14.5px; margin-bottom: 6px; display: block; }
.hint { color: var(--text-dim); font-size: 13.5px; line-height: 1.6; margin: 6px 0 16px; }
.status-msg { font-size: 14px; margin-top: 12px; padding: 10px 12px; border-radius: var(--radius-sm); display: none; }
.status-msg.ok { display: block; background: var(--green-dim); color: var(--green); }
.status-msg.err { display: block; background: rgba(255,80,80,.12); color: var(--red); }
.cloud-box { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; background: var(--bg-elev-2); }
.cloud-box .signed-in { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 14px; }
.cloud-box .signed-in b { word-break: break-all; }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--bg-elev); border-radius: var(--radius); max-width: 480px; width: 100%; padding: 24px; box-shadow: var(--shadow); max-height: 90vh; overflow-y: auto; }
.modal h2 { margin-top: 0; display: flex; align-items: center; }
.modal h2 .x { margin-left: auto; cursor: pointer; background: none; border: none; font-size: 22px; color: var(--text-dim); }
.modal .row-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

/* Misc */
.spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 20px auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { text-align: center; color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
.empty { text-align: center; padding: 52px 24px; color: var(--text-dim); }
.empty .big-emoji { font-size: 48px; margin-bottom: 14px; }
.empty h3 { margin: 0 0 8px; color: var(--text); font-size: 18px; }
.empty p { line-height: 1.65; max-width: 380px; margin: 0 auto; }
.back-link { background: none; border: none; color: var(--accent); cursor: pointer; font-weight: 600; font-size: 14px; padding: 0 0 14px; display: inline-flex; gap: 6px; align-items: center; font-family: inherit; }
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--bg-elev); border: 1px solid var(--border); box-shadow: var(--shadow);
  padding: 14px 18px; border-radius: 18px; z-index: 200; display: flex; align-items: center; gap: 12px; font-size: 14.5px;
  max-width: 92vw;
}
.watched-ind { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.inline-date { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.inline-date input[type="date"] { width: auto; padding: 6px 10px; }
@media (max-width: 560px) {
  .stat-cards { grid-template-columns: 1fr; }
  .detail-hero { flex-direction: column; }
  .detail-poster { width: 100px; }
  .brand { font-size: 17px; }
  /* One provider card per row on narrow phones so name + button always have room. */
  .prov-grid { grid-template-columns: 1fr; }
}
</style>

<div id="app"></div>

<script>
"use strict";
/* ============ Supabase (built in) ============ */
/* Natalie's own Watch Wizard Supabase project — hard-coded so cloud sync is always
   configured. The anon/publishable key is safe to ship in the browser; row-level
   security (see supabase-schema.sql) is the actual boundary. These constants take
   precedence over any old per-device values that were once typed into Settings. */
var SUPABASE_URL = "https://uuypgsblattorvhovopd.supabase.co";
var SUPABASE_ANON_KEY = "sb_publishable_hcOqXW-Nv5G2DraZiRgrXA_GFF7jhY5";

/* Natalie's own TMDB key, embedded so a fresh device skips the first-run key
   screen (same idea as the Supabase key above). This is PUBLIC in the repo —
   TMDB v3 keys / v4 tokens are free, read-only and rate-limited, so it's an
   accepted trade. A key typed into Settings or synced from the cloud profile
   still takes precedence over this (see boot() — it only seeds when nothing
   local is set). Paste a v3 API key or a v4 Read Access Token between the quotes;
   leave it "" to fall back to the old first-run/sync behaviour. */
var TMDB_KEY = "076603888eccb81654a8a6f299a97e53";

/* ============ Constants & Storage ============ */
var K = {
  apiKey: "wciw.apiKey",
  services: "wciw.services",   // { "8": {id,name,logo_path}, ... }
  history: "wciw.history",     // [ {tmdbId,title,mediaType,providerId,providerName,date,bucket} ]
  theme: "wciw.theme",         // "light" | "dark" | "auto"
  region: "wciw.region",       // fixed "GB"
  supaUrl: "wciw.supaUrl",     // LEGACY: once-typed Supabase URL; now built in, cleaned up on init
  supaAnon: "wciw.supaAnon",   // LEGACY: once-typed anon key; now built in, cleaned up on init
  pendingOps: "wciw.pendingOps" // offline write queue [ {op, ...} ]
};
var IMG = "https://image.tmdb.org/t/p/";
var API = "https://api.themoviedb.org/3";
var REGION = "GB";

function load(key, fallback) {
  try { var v = localStorage.getItem(key); return v == null ? fallback : JSON.parse(v); }
  catch (e) { return fallback; }
}
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }

/* ============ Helpers ============ */
function esc(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}
function el(html) { var t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
function $(sel, ctx) { return (ctx || document).querySelector(sel); }
function $all(sel, ctx) { return Array.prototype.slice.call((ctx || document).querySelectorAll(sel)); }
function todayStr() {
  var d = new Date(); var m = String(d.getMonth() + 1).padStart(2, "0"); var day = String(d.getDate()).padStart(2, "0");
  return d.getFullYear() + "-" + m + "-" + day;
}
function fmtDate(iso) {
  if (!iso) return "";
  var p = iso.split("-"); if (p.length !== 3) return iso;
  return p[2] + "/" + p[1] + "/" + p[0];
}
function debounce(fn, ms) {
  var t; return function () { var a = arguments, c = this; clearTimeout(t); t = setTimeout(function () { fn.apply(c, a); }, ms); };
}
function justwatchUrl(title) { return "https://www.justwatch.com/uk/search?q=" + encodeURIComponent(title); }
function yearOf(item) {
  var d = item.release_date || item.first_air_date || "";
  return d ? d.slice(0, 4) : "";
}
function titleOf(item) { return item.title || item.name || "Untitled"; }

/* ============ API ============ */
function apiFetch(path, params) {
  var key = load(K.apiKey, "");
  var isV4 = typeof key === "string" && key.indexOf("eyJ") === 0;
  var url = API + path;
  var qp = params ? Object.assign({}, params) : {};
  if (!isV4) qp.api_key = key;
  var qs = Object.keys(qp).map(function (k) { return encodeURIComponent(k) + "=" + encodeURIComponent(qp[k]); }).join("&");
  if (qs) url += (url.indexOf("?") >= 0 ? "&" : "?") + qs;
  var opts = { method: "GET", headers: { "Content-Type": "application/json;charset=utf-8" } };
  if (isV4) opts.headers.Authorization = "Bearer " + key;
  return fetch(url, opts).then(function (res) {
    if (res.status === 401) { var e = new Error("Invalid API key. Please check it in Settings."); e.code = 401; throw e; }
    if (!res.ok) { var e2 = new Error("Request failed (" + res.status + ")."); e2.code = res.status; throw e2; }
    return res.json();
  });
}

function applyTheme() {
  var t = load(K.theme, "auto");
  var html = document.documentElement;
  if (t === "auto") {
    var dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    html.setAttribute("data-theme", dark ? "dark" : "light");
  } else {
    html.setAttribute("data-theme", t);
  }
}

  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
    if (load(K.theme, "auto") === "auto") applyTheme();
  });
}

  var cur = load(K.theme, "auto");

  var next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";

  var b = $("#themeBtn"); if (b) b.textContent = themeIcon();

/* Sync status pill: synced / offline / local-only */
function updateSyncPill() {
  var pill = $("#syncPill"); if (!pill) return;
  pill.classList.remove("synced", "offline");
  var label = pill.querySelector(".sync-label");
  if (!Cloud.isConfigured() || !Cloud.libAvailable()) {
    if (label) label.textContent = "Local only";
    pill.title = "Cloud sync couldn’t load (offline or blocked). The app still works locally.";
  } else if (!Cloud.user) {
    if (label) label.textContent = "Sign in";
    pill.title = "Cloud sync configured. Tap to sign in.";
  } else if (Cloud.offline || Cloud.pendingCount() > 0) {
    pill.classList.add("offline");
    var pc = Cloud.pendingCount();
    if (label) label.textContent = pc > 0 ? ("Offline (" + pc + ")") : "Offline";
    pill.title = "Signed in as " + Cloud.user.email + " — changes will sync when back online.";
  } else {
    pill.classList.add("synced");
    if (label) label.textContent = "Synced";
    pill.title = "Synced as " + Cloud.user.email;
  }
}

/* ============ Toast ============ */
var toastTimer;
function toast(msg, actionLabel, actionFn) {
  var existing = $(".toast"); if (existing) existing.remove();
  clearTimeout(toastTimer);
  var t = el('<div class="toast"><span>' + esc(msg) + '</span></div>');
  if (actionLabel) {
    var b = el('<button class="btn btn-sm">' + esc(actionLabel) + '</button>');
    b.onclick = function () { t.remove(); if (actionFn) actionFn(); };
    t.appendChild(b);
  }
  document.body.appendChild(t);
  toastTimer = setTimeout(function () { if (t.parentNode) t.remove(); }, 4200);
}

/* ============ Cloud sync (Supabase) ============ */
var Cloud = {
  client: null,
  user: null,
  offline: false,

  /* Cloud sync is always configured now — the URL + anon key are built in.
     (This still guards against a blank build so the rest of the code is safe.) */
  isConfigured: function () { return !!(SUPABASE_URL && SUPABASE_ANON_KEY); },

  libAvailable: function () { return typeof window.supabase !== "undefined" && !!window.supabase.createClient; },

  /* Return the current page URL with any hash stripped (magic-link redirect target). */
  redirectUrl: function () { return location.origin + location.pathname + location.search; },

  /* Initialise the client from the built-in creds. Returns true if a client exists.
     Old per-device values that were once typed into Settings are cleaned up here so
     the embedded constants always win. */
  init: function () {
    Cloud.client = null; Cloud.user = null;
    if (load(K.supaUrl, null) != null || load(K.supaAnon, null) != null) {
      localStorage.removeItem(K.supaUrl); localStorage.removeItem(K.supaAnon);
    }
    if (!Cloud.isConfigured() || !Cloud.libAvailable()) return false;
    try {
      Cloud.client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
      });
    } catch (e) { Cloud.client = null; return false; }
    // Keep local user reference in sync with auth changes.
    Cloud.client.auth.onAuthStateChange(function (_event, session) {
      Cloud.user = session ? session.user : null;
      updateSyncPill();
    });
    return true;
  },

  /* Resolve current session/user. */
  refreshUser: function () {
    if (!Cloud.client) return Promise.resolve(null);
    return Cloud.client.auth.getSession().then(function (r) {
      Cloud.user = (r && r.data && r.data.session) ? r.data.session.user : null;
      return Cloud.user;
    }).catch(function () { Cloud.user = null; return null; });
  },

  signIn: function (email) {
    if (!Cloud.client) return Promise.reject(new Error("Cloud sync not configured."));
    return Cloud.client.auth.signInWithOtp({
      email: email,
      options: { emailRedirectTo: Cloud.redirectUrl() }
    }).then(function (r) {
      if (r.error) throw r.error;
      return r;
    });
  },

  signOut: function () {
    if (!Cloud.client) return Promise.resolve();
    return Cloud.client.auth.signOut().then(function () { Cloud.user = null; });
  },

  /* ---- Pending offline op queue ---- */
  pendingCount: function () { return load(K.pendingOps, []).length; },
  enqueue: function (op) {
    var q = load(K.pendingOps, []); q.push(op); save(K.pendingOps, q); updateSyncPill();
  },
  flushQueue: function () {
    if (!Cloud.client || !Cloud.user) return Promise.resolve();
    var q = load(K.pendingOps, []);
    if (!q.length) { Cloud.offline = false; return Promise.resolve(); }
    // Replay in order; stop (and keep remainder) on first failure.
    var i = 0;
    function step() {
      if (i >= q.length) { save(K.pendingOps, []); Cloud.offline = false; updateSyncPill(); return Promise.resolve(); }
      return Cloud.applyOp(q[i]).then(function () {
        i++; return step();
      }).catch(function () {
        // network still down: keep the unprocessed tail, remain "offline"
        save(K.pendingOps, q.slice(i)); Cloud.offline = true; updateSyncPill();
        return Promise.resolve();
      });
    }
    return step();
  },

  /* Apply a single queued op to Supabase. */
  applyOp: function (op) {
    var c = Cloud.client, uid = Cloud.user && Cloud.user.id;
    if (!c || !uid) return Promise.reject(new Error("not signed in"));
    if (op.op === "addWatch") {
      var row = Object.assign({}, op.row); row.user_id = uid;
      return c.from("watches").insert(row).then(chk);
    }
    if (op.op === "delWatchMatch") {
      var qy = c.from("watches").delete().eq("user_id", uid)
        .eq("tmdb_id", op.match.tmdb_id).eq("media_type", op.match.media_type)
        .eq("watch_date", op.match.watch_date);
      qy = op.match.provider_id == null ? qy.is("provider_id", null) : qy.eq("provider_id", op.match.provider_id);
      return qy.then(chk);
    }
    if (op.op === "addService") {
      var srow = Object.assign({}, op.row); srow.user_id = uid;
      return c.from("services").upsert(srow, { onConflict: "user_id,provider_id" }).then(chk);
    }
    if (op.op === "delService") {
      return c.from("services").delete().eq("user_id", uid).eq("provider_id", op.provider_id).then(chk);
    }
    if (op.op === "profile") {
      var prow = { user_id: uid, updated_at: new Date().toISOString() };
      prow[op.field] = op.value;
      return c.from("profiles").upsert(prow, { onConflict: "user_id" }).then(chk);
    }
    return Promise.resolve();
    function chk(r) { if (r && r.error) throw r.error; return r; }
  },

  /* Try to run an op now; if it fails, queue it for later. */
  run: function (op) {
    if (!Cloud.client || !Cloud.user) return Promise.resolve();
    return Cloud.applyOp(op).then(function () {
      Cloud.offline = false; updateSyncPill();
    }).catch(function () {
      Cloud.enqueue(op); Cloud.offline = true; updateSyncPill();
    });
  },

  /* Convenience wrappers used by the app's mutation points. */
  addWatch: function (entry) {
    return Cloud.run({ op: "addWatch", row: watchEntryToRow(entry) });
  },
  delWatch: function (entry) {
    return Cloud.run({ op: "delWatchMatch", match: {
      tmdb_id: entry.tmdbId, media_type: entry.mediaType,
      provider_id: entry.providerId == null ? null : entry.providerId,
      watch_date: entry.date
    } });
  },
  addService: function (s) {
    return Cloud.run({ op: "addService", row: { provider_id: s.id, name: s.name, logo_path: s.logo_path || null } });
  },
  delService: function (id) {
    return Cloud.run({ op: "delService", provider_id: Number(id) });
  },
  saveProfileField: function (field, value) {
    if (!Cloud.client || !Cloud.user) return Promise.resolve();
    return Cloud.run({ op: "profile", field: field, value: value });
  },

  /* Pull all cloud data for the signed-in user. */
  fetchAll: function () {
    var c = Cloud.client, uid = Cloud.user && Cloud.user.id;
    if (!c || !uid) return Promise.reject(new Error("not signed in"));
    return Promise.all([
      c.from("watches").select("*").eq("user_id", uid),
      c.from("services").select("*").eq("user_id", uid),
      c.from("profiles").select("*").eq("user_id", uid).maybeSingle()
    ]).then(function (r) {
      if (r[0].error) throw r[0].error;
      if (r[1].error) throw r[1].error;
      // profile may legitimately be empty
      return {
        watches: r[0].data || [],
        services: r[1].data || [],
        profile: (r[2] && r[2].data) || null
      };
    });
  }
};

/* Map a local history entry <-> Supabase watches row. */
function watchEntryToRow(e) {
  return {
    tmdb_id: e.tmdbId, title: e.title, media_type: e.mediaType,
    provider_id: e.providerId == null ? null : e.providerId,
    provider_name: e.providerName || null, bucket: e.bucket || null,
    watch_date: e.date
  };
}
function watchRowToEntry(r) {
  return {
    tmdbId: r.tmdb_id, title: r.title, mediaType: r.media_type,
    providerId: r.provider_id == null ? null : r.provider_id,
    providerName: r.provider_name, date: r.watch_date, bucket: r.bucket
  };
}
function watchKey(e) {
  return [e.tmdbId, e.mediaType, e.providerId == null ? "none" : e.providerId, e.date].join("|");
}

/* Merge cloud + local, dedup, persist locally, and (if needed) upload missing local rows. */
function mergeCloudIntoLocal(cloud) {
  // ----- watches: union deduped by tmdb_id+provider_id+watch_date (+media_type) -----
  var cloudEntries = cloud.watches.map(watchRowToEntry);
  var seen = {};
  var merged = [];
  cloudEntries.forEach(function (e) { var k = watchKey(e); if (!seen[k]) { seen[k] = true; merged.push(e); } });
  var localOnlyWatches = [];
  STATE.history.forEach(function (e) {
    var k = watchKey(e);
    if (!seen[k]) { seen[k] = true; merged.push(e); localOnlyWatches.push(e); }
  });
  STATE.history = merged;
  save(K.history, STATE.history);

  // ----- services: union by provider_id -----
  var svc = {};
  cloud.services.forEach(function (s) { svc[String(s.provider_id)] = { id: s.provider_id, name: s.name, logo_path: s.logo_path || null }; });
  var localOnlyServices = [];
  Object.keys(STATE.services).forEach(function (id) {
    if (!svc[id]) { svc[id] = STATE.services[id]; localOnlyServices.push(svc[id]); }
  });
  STATE.services = svc;
  save(K.services, STATE.services);

  // ----- profile: cloud wins for fields it has; otherwise keep local -----
  var localKey = load(K.apiKey, "");
  var localTheme = load(K.theme, "auto");
  if (cloud.profile) {
    if (cloud.profile.tmdb_key) save(K.apiKey, cloud.profile.tmdb_key);
    else if (localKey) Cloud.saveProfileField("tmdb_key", localKey);   // push local-only key up
    if (cloud.profile.theme) { save(K.theme, cloud.profile.theme); applyTheme(); }
    else if (localTheme) Cloud.saveProfileField("theme", localTheme);
  } else {
    // No profile row yet: seed it from local values.
    if (localKey) Cloud.saveProfileField("tmdb_key", localKey);
    if (localTheme) Cloud.saveProfileField("theme", localTheme);
  }

  // Upload any local-only watches/services so both sides converge.
  localOnlyWatches.forEach(function (e) { Cloud.addWatch(e); });
  localOnlyServices.forEach(function (s) { Cloud.addService(s); });
}

/* Offer a one-tap migration when local data exists and cloud is empty. */
function maybeOfferMigration(cloud) {
  var cloudEmpty = (!cloud.watches.length && !cloud.services.length);
  var localData = (STATE.history.length || Object.keys(STATE.services).length);
  if (cloudEmpty && localData) {
    toast("Shall the Wizard tuck this device's data into the cloud? ✨", "Yes, move my data in", function () {
      var ops = 0;
      STATE.history.forEach(function (e) { Cloud.addWatch(e); ops++; });
      Object.keys(STATE.services).forEach(function (id) { Cloud.addService(STATE.services[id]); ops++; });
      var key = load(K.apiKey, ""); if (key) Cloud.saveProfileField("tmdb_key", key);
      Cloud.saveProfileField("theme", load(K.theme, "auto"));
      toast("Uploading " + ops + " item" + (ops === 1 ? "" : "s") + " …");
      updateSyncPill();
    });
  }
}

/* Full sign-in-time sync: fetch, merge, flush queue, refresh view. */
function syncOnSignIn() {
  if (!Cloud.client || !Cloud.user) return Promise.resolve();
  return Cloud.flushQueue().then(function () {
    return Cloud.fetchAll();
  }).then(function (cloud) {
    Cloud.offline = false;
    maybeOfferMigration(cloud);
    mergeCloudIntoLocal(cloud);
    updateSyncPill();
    if ($("#view")) route();
  }).catch(function () {
    // Offline: keep the local mirror, mark offline.
    Cloud.offline = true; updateSyncPill();
  });
}

        if (d.services) { save(K.services, d.services); STATE.services = d.services; }
        if (d.history) { save(K.history, d.history); STATE.history = d.history; }
        if (d.theme) { save(K.theme, d.theme); applyTheme(); }
        // Push imported data to the cloud if signed in.
        if (Cloud.user) {
          if (d.history) d.history.forEach(function (e) { Cloud.addWatch(e); });
          if (d.services) Object.keys(d.services).forEach(function (id) { Cloud.addService(d.services[id]); });
          if (d.theme) Cloud.saveProfileField("theme", d.theme);
        }
        setStatus(true, "✓ Imported. Reloading views…");
        setTimeout(function () { close(); route(); }, 700);
      } catch (e) { setStatus(false, "✗ Invalid JSON file."); }
    };
    r.readAsText(f);
  };
  $all("button", $("#themeRow")).forEach(function (b) {
    if (load(K.theme, "auto") === b.getAttribute("data-t")) b.classList.add("btn-primary");
    b.onclick = function () {
      var t = b.getAttribute("data-t");
      save(K.theme, t); applyTheme();
      $all("#themeRow button").forEach(function (x) { x.classList.remove("btn-primary"); });
      b.classList.add("btn-primary");
      var tb = $("#themeBtn"); if (tb) tb.textContent = themeIcon();
      Cloud.saveProfileField("theme", t);
    };
  });
  $("#setClear").onclick = function () {
    if (!confirm("This will clear your API key, services and watch history from this browser. Your cloud data (if you sync) stays put. Are you sure?")) return;
    [K.apiKey, K.services, K.history, K.theme, K.region, K.pendingOps].forEach(function (k) { localStorage.removeItem(k); });
    close(); boot();
  };

  renderCloudBox($("#cloudBox", m), close);
}

/* Cloud-sync section inside Settings. Cloud sync is always configured (creds are
   built in) — so the only step here is a magic-link sign-in. */
function renderCloudBox(box, closeModal) {
  box.innerHTML = "";

  function supaStatus(ok, msg) { var s = $("#supaStatus", box); if (!s) return; s.className = "status-msg " + (ok ? "ok" : "err"); s.textContent = msg; }

  if (!Cloud.libAvailable()) {
    box.appendChild(el('<p class="hint" style="margin:0;">Cloud sync library couldn’t load (offline or blocked). The app still works locally. Reconnect and reload to enable syncing.</p>'));
    return;
  }

  // Cloud is always configured; make sure a client exists.
  if (!Cloud.client) Cloud.init();

  box.appendChild(el('<p class="hint" style="margin:0 0 12px;">Keep your services, watch history and TMDB key in step across all your devices. Just sign in with a magic link — no passwords, nothing to set up.</p>'));
  box.appendChild(el('<div class="status-msg" id="supaStatus"></div>'));

  if (!Cloud.client) return;

  // ---- Auth state ----
  var authWrap = el('<div></div>');
  box.appendChild(authWrap);

  if (Cloud.user) {
    var si = el(
      '<div class="signed-in">Signed in as <b>' + esc(Cloud.user.email || "(no email)") + '</b>' +
      '<button class="btn btn-sm" id="supaSignOut" style="margin-left:auto;">Sign out</button></div>'
    );
    authWrap.appendChild(si);
    var pc = Cloud.pendingCount();
    if (pc > 0) authWrap.appendChild(el('<p class="hint" style="margin:8px 0 0;">⏳ ' + pc + ' change' + (pc === 1 ? '' : 's') + ' waiting to sync. They’ll upload automatically when you’re back online.</p>'));
    else authWrap.appendChild(el('<p class="hint" style="margin:8px 0 0;color:var(--green);">✓ Everything is synced.</p>'));
    // Manual upload button (re-offer migration).
    var up = el('<div class="row-btns"><button class="btn btn-sm" id="supaUpload">☁️ Upload this device’s data</button><button class="btn btn-sm" id="supaPull">⬇ Refresh from cloud</button></div>');
    authWrap.appendChild(up);
    $("#supaSignOut", authWrap).onclick = function () {
      Cloud.signOut().then(function () { updateSyncPill(); renderCloudBox(box, closeModal); });
    };
    $("#supaUpload", authWrap).onclick = function () {
      var ops = 0;
      STATE.history.forEach(function (e) { Cloud.addWatch(e); ops++; });
      Object.keys(STATE.services).forEach(function (id) { Cloud.addService(STATE.services[id]); ops++; });
      var key = load(K.apiKey, ""); if (key) Cloud.saveProfileField("tmdb_key", key);
      Cloud.saveProfileField("theme", load(K.theme, "auto"));
      toast("Uploading " + ops + " item" + (ops === 1 ? "" : "s") + " to the cloud…");
      renderCloudBox(box, closeModal);
    };
    $("#supaPull", authWrap).onclick = function () {
      toast("Refreshing from cloud…");
      syncOnSignIn().then(function () { renderCloudBox(box, closeModal); });
    };
  } else {
    var form = el(
      '<div>' +
      '<label class="field-label" for="supaEmail">Sign in with a magic link ✨</label>' +
      '<input type="email" id="supaEmail" placeholder="you@example.com" autocomplete="email" value="' + esc((Cloud.defaultEmail || "")) + '" />' +
      '<div class="row-btns"><button class="btn btn-sm btn-primary" id="supaSend">Send me a magic link</button></div>' +
      '<p class="hint" style="margin:8px 0 0;">We’ll pop a link in your inbox. Open it on this device to finish signing in — no password needed.</p>' +
      '</div>'
    );
    authWrap.appendChild(form);
    $("#supaSend", authWrap).onclick = function () {
      var email = $("#supaEmail", authWrap).value.trim();
      if (!email) { supaStatus(false, "Enter your email address."); return; }
      $("#supaSend", authWrap).disabled = true;
      Cloud.signIn(email).then(function () {
        supaStatus(true, "✓ Magic link sent to " + email + ". Check your inbox and open it on this device.");
      }).catch(function (e) {
        supaStatus(false, "✗ " + (e && e.message ? e.message : "Couldn’t send the link."));
      }).finally(function () { var b = $("#supaSend", authWrap); if (b) b.disabled = false; });
    };
  }
}

/* ============ Search Tab ============ */
var searchCache = { query: "", results: null };

function renderSearch(view) {
  // If a detail is open, render it instead
  if (STATE.currentDetail) { renderDetail(view, STATE.currentDetail); return; }
  view.innerHTML = "";
  var wrap = el(
    '<div>' +
    '<div class="search-wrap">' +
    '<input type="text" class="input" id="q" placeholder="What are you after? Search films & TV…" autocomplete="off" />' +
    '<button class="clear-x" id="clearQ" title="Clear" style="display:none;">&times;</button>' +
    '</div>' +
    '<div id="results"></div>' +
    '</div>'
  );
  view.appendChild(wrap);
  var q = $("#q", wrap);
  var resBox = $("#results", wrap);
  q.value = searchCache.query;
  $("#clearQ").style.display = q.value ? "block" : "none";

  if (searchCache.results) renderResults(resBox, searchCache.results);
  else emptySearch(resBox);

  var runSearch = debounce(function (term) {
    if (!term) { searchCache = { query: "", results: null }; emptySearch(resBox); return; }
    resBox.innerHTML = '<div class="spinner"></div><div class="loading-msg">Consulting the crystal ball…</div>';
    apiFetch("/search/multi", { query: term, include_adult: "false" }).then(function (data) {
      var list = (data.results || []).filter(function (r) { return r.media_type === "movie" || r.media_type === "tv"; });
      searchCache = { query: term, results: list };
      renderResults(resBox, list);
    }).catch(function (e) {
      resBox.innerHTML = "";
      resBox.appendChild(errBox(e));
    });
  }, 400);

  q.addEventListener("input", function () {
    $("#clearQ").style.display = q.value ? "block" : "none";
    searchCache.query = q.value.trim();
    runSearch(q.value.trim());
  });
  $("#clearQ").onclick = function () { q.value = ""; $("#clearQ").style.display = "none"; searchCache = { query: "", results: null }; emptySearch(resBox); q.focus(); };
  q.focus();
}

function emptySearch(box) {
  box.innerHTML = "";
  box.appendChild(el(
    '<div class="empty"><div class="big-emoji">🔮</div>' +
    '<h3>What shall we watch tonight?</h3>' +
    '<p>Type a film or TV show up top and the Wizard will reveal which UK streaming services have it — with the ones you already have gently highlighted. ✨</p></div>'
  ));
}

function errBox(e) {
  if (e && e.code === 401) {
    var b = el('<div class="empty"><div class="big-emoji">🔑</div><h3>Hmm, that key needs a look</h3><p>' + esc(e.message) + '</p></div>');
    var btn = el('<button class="btn btn-primary">Open Settings</button>'); btn.onclick = openSettings; b.appendChild(btn); return b;
  }
  var msg = (e && e.message) ? e.message : "Something went a bit wonky.";
  if (e && e.name === "TypeError") msg = "The Wizard couldn\'t reach TMDB just now — do check your internet and give it another go.";
  return el('<div class="empty"><div class="big-emoji">🌙</div><h3>Couldn\'t quite load that</h3><p>' + esc(msg) + '</p></div>');
}

function renderResults(box, list) {
  box.innerHTML = "";
  if (!list.length) {
    box.appendChild(el('<div class="empty"><div class="big-emoji">🤔</div><h3>Nothing turned up</h3><p>The Wizard couldn\'t find a match — try a different spelling or another title.</p></div>'));
    return;
  }
  var listEl = el('<div class="result-list"></div>');
  list.forEach(function (item) {
    var poster = item.poster_path
      ? '<img class="poster-thumb" src="' + IMG + "w154" + esc(item.poster_path) + '" alt="" loading="lazy" />'
      : '<div class="poster-thumb placeholder">' + (item.media_type === "tv" ? "📺" : "🎬") + '</div>';
    var year = yearOf(item);
    var badge = item.media_type === "tv" ? '<span class="badge tv">TV</span>' : '<span class="badge movie">Film</span>';
    var watched = countWatches(item.id, item.media_type);
    var watchInd = watched ? '<span style="color:var(--green);font-weight:600;">✓ watched</span>' : '';
    var row = el(
      '<button class="result-item">' + poster +
      '<div class="result-meta"><div class="result-title">' + esc(titleOf(item)) + '</div>' +
      '<div class="result-sub">' + badge + (year ? '<span>' + esc(year) + '</span>' : '') + watchInd + '</div></div></button>'
    );
    row.onclick = function () { openDetail(item.id, item.media_type); };
    listEl.appendChild(row);
  });
  box.appendChild(listEl);
}

function openDetail(id, mediaType) {
  STATE.currentDetail = { id: id, mediaType: mediaType, loading: true };
  location.hash = "#/detail";
  var view = $("#view");
  renderDetail(view, STATE.currentDetail);
  // fetch details + providers in parallel
  Promise.all([
    apiFetch("/" + mediaType + "/" + id, {}),
    apiFetch("/" + mediaType + "/" + id + "/watch/providers", {})
  ]).then(function (r) {
    STATE.currentDetail = {
      id: id, mediaType: mediaType, loading: false,
      info: r[0], providers: (r[1].results && r[1].results[REGION]) || null
    };
    renderDetail($("#view"), STATE.currentDetail);
  }).catch(function (e) {
    STATE.currentDetail = { id: id, mediaType: mediaType, loading: false, error: e };
    renderDetail($("#view"), STATE.currentDetail);
  });
}

function backToSearch() {
  STATE.currentDetail = null;
  location.hash = "#/search";
}

// De-dupe providers across buckets, collecting labels.
var BUCKET_LABEL = { flatrate: "Included", free: "Free", ads: "Free (ads)", rent: "Rent", buy: "Buy" };
function collectProviders(gb) {
  // Returns { included:[], free:[], rent:[], buy:[] } grouped for display, each provider with labels[]
  var byId = {};
  var order = ["flatrate", "free", "ads", "rent", "buy"];
  order.forEach(function (bucket) {
    (gb[bucket] || []).forEach(function (p) {
      var id = p.provider_id;
      if (!byId[id]) byId[id] = { id: id, name: p.provider_name, logo: p.logo_path, buckets: [], priority: p.display_priority || 999 };
      if (byId[id].buckets.indexOf(bucket) < 0) byId[id].buckets.push(bucket);
    });
  });
  return byId;
}

function renderDetail(view, d) {
  view.innerHTML = "";
  var back = el('<button class="back-link">← Back to search</button>');
  back.onclick = backToSearch;
  view.appendChild(back);

  if (d.loading) { view.appendChild(el('<div class="spinner"></div><div class="loading-msg">Peering into the streaming mists…</div>')); return; }
  if (d.error) { view.appendChild(errBox(d.error)); return; }

  var info = d.info || {};
  var title = titleOf(info);
  var year = yearOf(info);
  var poster = info.poster_path
    ? '<img class="detail-poster" src="' + IMG + "w154" + esc(info.poster_path) + '" alt="" />'
    : '<div class="detail-poster placeholder">' + (d.mediaType === "tv" ? "📺" : "🎬") + '</div>';
  var badge = d.mediaType === "tv" ? '<span class="badge tv">TV</span>' : '<span class="badge movie">Film</span>';

  var tmdbUrl = "https://www.themoviedb.org/" + (d.mediaType === "tv" ? "tv" : "movie") + "/" + encodeURIComponent(d.id);
  var titleLink = '<a class="title-link" href="' + esc(tmdbUrl) + '" target="_blank" rel="noopener" title="View on TMDB">' + esc(title) + '<span class="ext" aria-hidden="true">↗</span></a>';
  var hero = el(
    '<div class="detail-hero">' + poster +
    '<div><h2 class="detail-title">' + titleLink + '</h2>' +
    '<div class="result-sub">' + badge + (year ? '<span>' + esc(year) + '</span>' : '') + '</div>' +
    (info.overview ? '<p class="detail-overview">' + esc(info.overview) + '</p>' : '') +
    '</div></div>'
  );
  view.appendChild(hero);

  // watched indicator
  var watchedList = STATE.history.filter(function (h) { return h.tmdbId === d.id && h.mediaType === d.mediaType; });
  var gb = d.providers;

  if (!gb || (!gb.flatrate && !gb.free && !gb.ads && !gb.rent && !gb.buy)) {
    var none = el(
      '<div class="summary-line none">🔮 Hmm, the Wizard couldn\'t find this streaming anywhere in the UK just now.</div>'
    );
    view.appendChild(none);
    var jw = el('<p class="hint">It may pop up elsewhere, or be available to rent — <a href="' + esc(justwatchUrl(title)) + '" target="_blank" rel="noopener">have a peek on JustWatch UK</a> ✨.</p>');
    view.appendChild(jw);
    appendGenericWatch(view, d, title);
    appendWatchedInd(view, watchedList);
    return;
  }

  var byId = collectProviders(gb);
  var provs = Object.keys(byId).map(function (k) { return byId[k]; });
  var owned = provs.filter(function (p) { return hasService(p.id); });

  // Summary line
  var summary;
  var includedOwned = owned.filter(function (p) { return p.buckets.indexOf("flatrate") >= 0 || p.buckets.indexOf("free") >= 0 || p.buckets.indexOf("ads") >= 0; });
  if (includedOwned.length) {
    var names = includedOwned.map(function (p) { return p.name; }).join(", ");
    var freeOnly = includedOwned.every(function (p) { return p.buckets.indexOf("flatrate") < 0; });
    summary = el('<div class="summary-line have">✨ Good news — you can watch this on ' + esc(names) + (freeOnly ? ' (free)' : ' (already included in your subscription)') + '</div>');
  } else if (owned.length) {
    var on = owned.map(function (p) { return p.name; }).join(", ");
    summary = el('<div class="summary-line have">✨ Available to rent or buy on ' + esc(on) + ' — a service you already have.</div>');
  } else {
    var hasRentBuy = gb.rent || gb.buy;
    if (gb.flatrate || gb.free || gb.ads) {
      summary = el('<div class="summary-line nohave">Not on one of your current services, but it\'s streaming on ' +
        esc(provs.filter(function (p) { return p.buckets.indexOf("flatrate") >= 0; }).map(function (p) { return p.name; }).join(", ") || "another service") +
        ' — or you could <a href="' + esc(justwatchUrl(title)) + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">rent or buy it (JustWatch has prices)</a>.</div>');
    } else {
      summary = el('<div class="summary-line nohave">Not on any of your services just now. It\'s available to rent or buy — <a href="' + esc(justwatchUrl(title)) + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">pop over to JustWatch UK for prices</a>.</div>');
    }
  }
  view.appendChild(summary);

  // Groups: Included (flatrate), Free (free+ads), Rent, Buy
  var groups = [
    { key: "included", label: "Included with subscription", test: function (p) { return p.buckets.indexOf("flatrate") >= 0; } },
    { key: "free", label: "Free", test: function (p) { return p.buckets.indexOf("free") >= 0 || p.buckets.indexOf("ads") >= 0; } },
    { key: "rent", label: "Rent", test: function (p) { return p.buckets.indexOf("rent") >= 0; } },
    { key: "buy", label: "Buy", test: function (p) { return p.buckets.indexOf("buy") >= 0; } }
  ];

  groups.forEach(function (g) {
    var members = provs.filter(g.test);
    if (!members.length) return;
    // sort: owned first, then priority
    members.sort(function (a, b) {
      var ao = hasService(a.id) ? 0 : 1, bo = hasService(b.id) ? 0 : 1;
      if (ao !== bo) return ao - bo;
      return a.priority - b.priority;
    });
    var grp = el('<div class="prov-group"><h4>' + esc(g.label) + '</h4><div class="prov-grid"></div></div>');
    var grid = $(".prov-grid", grp);
    members.forEach(function (p) {
      grid.appendChild(providerCard(p, d, title, g.key));
    });
    view.appendChild(grp);
  });

  appendGenericWatch(view, d, title);
  appendWatchedInd(view, watchedList);
}

function providerCard(p, d, title, bucketKey) {
  var owned = hasService(p.id);
  var logo = p.logo ? '<img class="prov-logo" src="' + IMG + "w92" + esc(p.logo) + '" alt="" />' : '<div class="prov-logo placeholder"></div>';
  var labels = p.buckets.map(function (b) { return BUCKET_LABEL[b]; });
  // dedupe labels (free+ads -> just show relevant)
  labels = labels.filter(function (v, i) { return labels.indexOf(v) === i; });
  var card = el(
    '<div class="prov-card' + (owned ? ' owned' : '') + '">' +
    logo +
    '<div class="prov-info"><div class="prov-name">' + esc(p.name) + '</div>' +
    '<div class="prov-labels">' + esc(labels.join(" / ")) + '</div>' +
    (owned ? '<span class="have-chip">You\'ve got this ✓</span>' : '') +
    '</div>' +
    '</div>'
  );
  var wb = el('<button class="btn btn-sm prov-watch-btn" title="Log a watch on ' + esc(p.name) + '">✓ Watched</button>');
  wb.onclick = function (e) {
    e.stopPropagation();
    promptWatch(d, title, { id: p.id, name: p.name, bucket: bucketKey });
  };
  card.appendChild(wb);
  return card;
}

function appendGenericWatch(view, d, title) {
  var row = el('<div style="margin-top:8px;"></div>');
  var b = el('<button class="btn">✓ I watched this (no service)</button>');
  b.onclick = function () { promptWatch(d, title, { id: null, name: "Other / unknown", bucket: "none" }); };
  row.appendChild(b);
  view.appendChild(row);
}

function appendWatchedInd(view, watchedList) {
  if (!watchedList.length) return;
  var box = el('<div class="watched-ind"></div>');
  var latest = watchedList.slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; })[0];
  box.appendChild(el('<span>✓ watched ' + (watchedList.length > 1 ? watchedList.length + " times, latest " : "on ") + esc(fmtDate(latest.date)) + (latest.providerName ? " (" + esc(latest.providerName) + ")" : "") + '</span>'));
  view.appendChild(box);
}

function promptWatch(d, title, provider) {
  var dateVal = todayStr();
  var toastEl = $(".toast"); if (toastEl) toastEl.remove();
  var t = el(
    '<div class="toast" style="flex-wrap:wrap;">' +
    '<span>Log a watch on <b>' + esc(provider.name) + '</b>?</span>' +
    '<div class="inline-date"><label style="font-size:13px;">Date:</label>' +
    '<input type="date" id="watchDate" value="' + dateVal + '" max="' + todayStr() + '" />' +
    '<button class="btn btn-sm btn-primary" id="confirmWatch">Save</button>' +
    '<button class="btn btn-sm btn-ghost" id="cancelWatch">Cancel</button></div>' +
    '</div>'
  );
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  $("#cancelWatch", t).onclick = function () { t.remove(); };
  $("#confirmWatch", t).onclick = function () {
    var date = $("#watchDate", t).value || todayStr();
    logWatch({
      tmdbId: d.id, title: title, mediaType: d.mediaType,
      providerId: provider.id, providerName: provider.name, date: date, bucket: provider.bucket
    });
    t.remove();
    toast("Lovely — “" + title + "” is in your history ✨");
    // refresh detail to update indicator
    if (STATE.currentDetail) renderDetail($("#view"), STATE.currentDetail);
  };
}

function logWatch(entry) {
  STATE.history.push(entry);
  save(K.history, STATE.history);
  Cloud.addWatch(entry);   // mirror to cloud (queues if offline)
}
function countWatches(tmdbId, mediaType) {
  return STATE.history.filter(function (h) { return h.tmdbId === tmdbId && h.mediaType === mediaType; }).length;
}

/* ============ My Services Tab ============ */
function loadProviderCatalog() {
  if (STATE.providersCatalog) return Promise.resolve(STATE.providersCatalog);
  return Promise.all([
    apiFetch("/watch/providers/movie", { watch_region: REGION }),
    apiFetch("/watch/providers/tv", { watch_region: REGION })
  ]).then(function (r) {
    var byId = {};
    [r[0], r[1]].forEach(function (resp) {
      (resp.results || []).forEach(function (p) {
        if (!byId[p.provider_id]) {
          byId[p.provider_id] = { id: p.provider_id, name: p.provider_name, logo: p.logo_path, priority: p.display_priority };
        } else {
          byId[p.provider_id].priority = Math.min(byId[p.provider_id].priority, p.display_priority);
        }
      });
    });
    var arr = Object.keys(byId).map(function (k) { return byId[k]; });
    arr.sort(function (a, b) { return a.priority - b.priority; });
    STATE.providersCatalog = arr;
    return arr;
  });
}

function renderServices(view) {
  view.innerHTML = "";
  var wrap = el(
    '<div>' +
    '<div class="search-wrap"><input type="text" class="input" id="svcFilter" placeholder="Find a streaming service…" autocomplete="off" /></div>' +
    '<div id="svcYours"></div>' +
    '<div id="svcAll"><div class="spinner"></div><div class="loading-msg">Gathering the UK\'s streaming services…</div></div>' +
    '</div>'
  );
  view.appendChild(wrap);

  loadProviderCatalog().then(function (catalog) {
    var filter = "";
    function draw() {
      var f = filter.toLowerCase();
      var yoursBox = $("#svcYours", wrap);
      var allBox = $("#svcAll", wrap);
      yoursBox.innerHTML = "";
      allBox.innerHTML = "";

      var ownedIds = Object.keys(STATE.services);
      // Your services section
      var owned = catalog.filter(function (p) { return hasService(p.id); });
      // include any owned services that aren't in the current catalog (rare)
      ownedIds.forEach(function (id) {
        if (!owned.some(function (p) { return String(p.id) === String(id); })) {
          var s = STATE.services[id]; owned.push({ id: Number(id), name: s.name, logo: s.logo_path, priority: 9999 });
        }
      });
      owned.sort(function (a, b) { return a.priority - b.priority; });

      var head = el('<div class="section-head"><h3>Your services</h3><span class="count-pill">' + owned.length + '</span></div>');
      yoursBox.appendChild(head);
      if (!owned.length) {
        yoursBox.appendChild(el('<div class="empty" style="padding:28px;"><div class="big-emoji">🛋️</div><h3>Let\'s set up your cosy shelf</h3><p>Flip the toggles below to tell the Wizard which services you subscribe to. It uses these to highlight where you can already watch things, and to keep an eye on your Stats.</p></div>'));
      } else {
        var yg = el('<div class="svc-grid"></div>');
        owned.forEach(function (p) { yg.appendChild(svcCard(p, draw)); });
        yoursBox.appendChild(yg);
      }

      // All services
      var allHead = el('<div class="section-head"><h3>All UK services</h3><span class="count-pill">' + catalog.length + '</span></div>');
      allBox.appendChild(allHead);
      var list = catalog.filter(function (p) { return !f || p.name.toLowerCase().indexOf(f) >= 0; });
      if (!list.length) {
        allBox.appendChild(el('<div class="empty" style="padding:24px;"><p>Nothing matches “' + esc(filter) + '” — try another name.</p></div>'));
      } else {
        var ag = el('<div class="svc-grid"></div>');
        list.forEach(function (p) { ag.appendChild(svcCard(p, draw)); });
        allBox.appendChild(ag);
      }
    }
    draw();
    $("#svcFilter", wrap).addEventListener("input", debounce(function (e) { filter = e.target.value.trim(); draw(); }, 200));
  }).catch(function (e) {
    $("#svcAll", wrap).innerHTML = "";
    $("#svcAll", wrap).appendChild(errBox(e));
  });
}

function svcCard(p, redraw) {
  var owned = hasService(p.id);
  var logo = p.logo ? '<img class="prov-logo" src="' + IMG + "w92" + esc(p.logo) + '" alt="" />' : '<div class="prov-logo placeholder"></div>';
  var card = el(
    '<div class="svc-card' + (owned ? ' owned' : '') + '">' + logo +
    '<div class="svc-info"><div class="svc-name">' + esc(p.name) + '</div></div>' +
    '<button class="toggle' + (owned ? ' on' : '') + '" title="I have it / I don\'t" aria-label="Toggle"></button>' +
    '</div>'
  );
  $(".toggle", card).onclick = function () {
    if (hasService(p.id)) {
      delete STATE.services[String(p.id)];
      save(K.services, STATE.services);
      Cloud.delService(p.id);
    } else {
      var rec = { id: p.id, name: p.name, logo_path: p.logo || null };
      STATE.services[String(p.id)] = rec;
      save(K.services, STATE.services);
      Cloud.addService(rec);
    }
    redraw();
  };
  return card;
}

/* ============ Stats Tab ============ */
var PERIODS = [
  { key: "7", label: "Last 7 days", days: 7 },
  { key: "30", label: "Last 30 days", days: 30 },
  { key: "90", label: "Last 90 days", days: 90 },
  { key: "365", label: "Last year", days: 365 },
  { key: "all", label: "All time", days: null }
];

function inPeriod(dateStr, days) {
  if (days == null) return true;
  var cutoff = new Date(); cutoff.setHours(0, 0, 0, 0); cutoff.setDate(cutoff.getDate() - (days - 1));
  var d = new Date(dateStr + "T00:00:00");
  return d >= cutoff;
}

function renderStats(view) {
  view.innerHTML = "";
  var seg = el('<div class="seg"></div>');
  PERIODS.forEach(function (p) {
    var b = el('<button' + (STATE.statsPeriod === p.key ? ' class="active"' : '') + '>' + esc(p.label) + '</button>');
    b.onclick = function () { STATE.statsPeriod = p.key; renderStats(view); };
    seg.appendChild(b);
  });
  view.appendChild(seg);

  var body = el('<div id="statsBody"></div>');
  view.appendChild(body);

  var period = PERIODS.filter(function (p) { return p.key === STATE.statsPeriod; })[0];
  var entries = STATE.history.filter(function (h) { return inPeriod(h.date, period.days); });

  if (!STATE.history.length) {
    body.appendChild(el(
      '<div class="empty"><div class="big-emoji">📖</div><h3>Your watch diary is empty — for now</h3>' +
      '<p>Pop over to the <b>Search</b> tab, open something you\'ve watched, and tap <b>✓ Watched</b> on the service you used. ' +
      'As your history grows, the Wizard will show your viewing habits and gently flag any subscriptions you\'re not really using. ✨</p></div>'
    ));
    return;
  }

  // Totals
  var byService = {};
  entries.forEach(function (h) {
    var id = h.providerId == null ? "none" : String(h.providerId);
    if (!byService[id]) byService[id] = { id: id, name: h.providerName, logo: providerLogo(id), count: 0, items: [] };
    byService[id].count++;
    byService[id].items.push(h);
  });
  var svcArr = Object.keys(byService).map(function (k) { return byService[k]; });
  svcArr.sort(function (a, b) { return b.count - a.count; });
  var total = entries.length;
  var most = svcArr.length ? svcArr[0].name : "—";

  var cards = el(
    '<div class="stat-cards">' +
    '<div class="stat-box"><div class="big">' + total + '</div><div class="lbl">watch' + (total === 1 ? '' : 'es') + ' in this period</div></div>' +
    '<div class="stat-box"><div class="big" style="font-size:20px;">' + esc(most) + '</div><div class="lbl">most-used service</div></div>' +
    '</div>'
  );
  body.appendChild(cards);

  // Unused subscriptions warning
  var watchedServiceIds = {};
  entries.forEach(function (h) { if (h.providerId != null) watchedServiceIds[String(h.providerId)] = true; });
  var unused = Object.keys(STATE.services).filter(function (id) { return !watchedServiceIds[id]; })
    .map(function (id) { return STATE.services[id]; });
  if (unused.length) {
    var wb = el(
      '<div class="warn-box"><h3>💸 A gentle nudge</h3>' +
      '<p>You\'re paying for these, but haven\'t logged a watch on them ' +
      (period.days ? 'in the ' + esc(period.label.toLowerCase()) : 'yet') + '. ' +
      'They may be quietly costing you money — worth a look to see if they\'re still earning their keep.</p>' +
      '<div class="warn-list"></div></div>'
    );
    var wl = $(".warn-list", wb);
    unused.forEach(function (s) {
      var logo = s.logo_path ? '<img class="prov-logo" style="width:24px;height:24px;" src="' + IMG + "w92" + esc(s.logo_path) + '" alt="" />' : '';
      wl.appendChild(el('<span class="chip">' + logo + esc(s.name) + '</span>'));
    });
    body.appendChild(wb);
  }

  // Breakdown bars
  if (!entries.length) {
    body.appendChild(el('<div class="empty" style="padding:32px;"><div class="big-emoji">🗓️</div><h3>Nothing logged in this window</h3><p>Try a longer time range, or log a few watches over on the Search tab.</p></div>'));
  } else {
    var maxCount = svcArr[0].count;
    var breakHead = el('<div class="section-head"><h3>Watches by service</h3></div>');
    body.appendChild(breakHead);
    var bars = el('<div class="card" style="padding:6px 16px;"></div>');
    svcArr.forEach(function (s) {
      var pct = Math.round((s.count / maxCount) * 100);
      var logo = s.logo ? '<img class="prov-logo" style="width:28px;height:28px;" src="' + IMG + "w92" + esc(s.logo) + '" alt="" />' : '<div class="prov-logo placeholder" style="width:28px;height:28px;"></div>';
      var row = el(
        '<div class="bar-row">' +
        '<div class="bar-head">' + logo +
        '<span style="font-weight:600;">' + esc(s.name) + '</span>' +
        '<span class="cnt">' + s.count + '</span><span class="chev">›</span></div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;"></div></div>' +
        '<div class="bar-detail" style="display:none;"></div>' +
        '</div>'
      );
      var head = $(".bar-head", row);
      var detail = $(".bar-detail", row);
      var items = s.items.slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; });
      items.forEach(function (h) {
        detail.appendChild(el('<div class="row"><span>' + esc(h.title) + '</span><span>' + esc(fmtDate(h.date)) + '</span></div>'));
      });
      head.onclick = function () {
        var open = detail.style.display !== "none";
        detail.style.display = open ? "none" : "flex";
        head.classList.toggle("open", !open);
      };
      bars.appendChild(row);
    });
    body.appendChild(bars);
  }

  // Manage history
  var mh = el('<div class="section-head"><h3>Manage history</h3><span class="count-pill">' + entries.length + '</span></div>');
  body.appendChild(mh);
  var histCard = el('<div class="card" style="padding:6px 16px;"></div>');
  var sorted = entries.slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; });
  sorted.forEach(function (h) {
    var histTitle;
    if (h.tmdbId != null && (h.mediaType === "tv" || h.mediaType === "movie")) {
      var histUrl = "https://www.themoviedb.org/" + h.mediaType + "/" + encodeURIComponent(h.tmdbId);
      histTitle = '<a class="title-link" href="' + esc(histUrl) + '" target="_blank" rel="noopener" title="View on TMDB">' + esc(h.title) + '<span class="ext" aria-hidden="true">↗</span></a>';
    } else {
      histTitle = esc(h.title);
    }
    var row = el(
      '<div class="hist-row">' +
      '<div><div class="h-title">' + histTitle + '</div>' +
      '<div class="h-meta">' + esc(fmtDate(h.date)) + ' · ' + esc(h.providerName || "Other") + ' · ' + esc(h.mediaType === "tv" ? "TV" : "Film") + '</div></div>' +
      '<button class="btn btn-sm btn-danger del">Delete</button>' +
      '</div>'
    );
    $(".del", row).onclick = function () {
      var idx = STATE.history.indexOf(h);
      if (idx >= 0) {
        var removed = STATE.history.splice(idx, 1)[0];
        save(K.history, STATE.history);
        Cloud.delWatch(removed);   // mirror deletion to cloud
        renderStats(view);
      }
    };
    histCard.appendChild(row);
  });
  body.appendChild(histCard);
}

function providerLogo(id) {
  if (id === "none") return null;
  var s = STATE.services[String(id)];
  if (s && s.logo_path) return s.logo_path;
  if (STATE.providersCatalog) {
    var m = STATE.providersCatalog.filter(function (p) { return String(p.id) === String(id); })[0];
    if (m) return m.logo;
  }
  return null;
}

/* ============ Routing ============ */
function route() {
  var hash = location.hash.replace(/^#\/?/, "") || "search";
  var r = hash.split("?")[0];
  if (r === "detail") {
    setActiveTab("search");
    // If we have a detail loaded, keep showing it; otherwise fall back to search list
    if (STATE.currentDetail) { var v = $("#view"); if (v) renderDetail(v, STATE.currentDetail); return; }
    r = "search";
  } else {
    // Navigating to any real tab clears an open detail (fixes Back button)
    STATE.currentDetail = null;
  }
  if (["search", "services", "stats"].indexOf(r) < 0) r = "search";
  setActiveTab(r);
  var view = $("#view"); if (!view) return;
  if (r === "search") renderSearch(view);
  else if (r === "services") renderServices(view);
  else if (r === "stats") renderStats(view);
}
window.addEventListener("hashchange", route);

/* ============ Auth callback handling ============ */
/* Supabase magic links put tokens in the URL hash (#access_token=...). On load we
   let supabase-js consume them (detectSessionInUrl), then clean the hash back to
   our own route so the hash-router doesn't try to interpret the auth callback. */
function looksLikeAuthCallback() {
  var h = location.hash || "";
  return h.indexOf("access_token=") >= 0 || h.indexOf("error_description=") >= 0 || h.indexOf("type=recovery") >= 0;
}
function cleanAuthHash() {
  // Replace the auth hash with our default route without adding a history entry.
  try { history.replaceState(null, "", location.pathname + location.search + "#/search"); }
  catch (e) { location.hash = "#/search"; }
}

/* ============ Boot ============ */
function boot() {
  // Seed the embedded TMDB key on a fresh device — only when nothing is stored
  // locally yet, so a user-entered or cloud-synced key always wins.
  if (TMDB_KEY && !load(K.apiKey, "")) save(K.apiKey, TMDB_KEY);
  if (!load(K.apiKey, "")) {
    // Even with no TMDB key yet, we may be mid auth-callback or already signed in.
    Cloud.init();
    if (looksLikeAuthCallback()) {
      // Let supabase-js finish processing, then sync (which may pull the TMDB key
      // from the cloud profile and re-boot into the full app).
      finishAuthAndSync(true);
      return;
    }
    // If cloud is configured and we already have a session, try to pull the key.
    if (Cloud.isConfigured()) {
      Cloud.refreshUser().then(function (u) {
        if (u) { syncOnSignIn().then(function () { if (load(K.apiKey, "")) boot(); else renderSetup(); }); }
        else renderSetup();
      });
      return;
    }
    renderSetup();
    return;
  }
  save(K.region, REGION);
  STATE.services = load(K.services, {});
  STATE.history = load(K.history, []);
  renderShell();
  // NOTE: do NOT touch location.hash yet when this is an auth callback — the
  // #access_token=… fragment must survive until supabase-js (detectSessionInUrl,
  // which runs asynchronously) has consumed it. cleanAuthHash() replaces it later.
  var authCallback = looksLikeAuthCallback();
  if (!location.hash && !authCallback) location.hash = "#/search";
  route();

  // Wire up cloud after the shell exists.
  Cloud.init();
  if (authCallback) {
    finishAuthAndSync(false);
  } else if (Cloud.isConfigured()) {
    Cloud.refreshUser().then(function (u) {
      updateSyncPill();
      if (u) syncOnSignIn();
    });
  } else {
    updateSyncPill();
  }
}

/* Give supabase-js a tick to detect the session from the URL, then sync. */
function finishAuthAndSync(rebootAfter) {
  var tries = 0;
  function attempt() {
    Cloud.refreshUser().then(function (u) {
      if (u) {
        cleanAuthHash();
        updateSyncPill();
        syncOnSignIn().then(function () {
          if (rebootAfter && load(K.apiKey, "")) boot();
          else if (rebootAfter) { renderSetup(); }
        });
      } else if (tries < 8) {
        tries++;
        setTimeout(attempt, 250);
      } else {
        // Gave up waiting; clean the hash and continue.
        cleanAuthHash();
        updateSyncPill();
        if (rebootAfter) renderSetup();
      }
    });
  }
  attempt();
}

/* Re-flush the offline queue whenever the browser regains connectivity. */
window.addEventListener("online", function () {
  if (Cloud.client && Cloud.user) {
    Cloud.flushQueue().then(function () { updateSyncPill(); if ($("#view")) route(); });
  }
});

/* ============ Service worker registration (RELATIVE path) ============ */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function () { /* PWA optional; ignore */ });
  });
}

boot();
</script>
